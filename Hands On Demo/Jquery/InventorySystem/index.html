<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shoe Inventory Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

  <h2 class="text-center mb-4">👟 Shoe Inventory Dashboard</h2>

  <!-- Dashboard -->
  <div class="row mb-4 text-center">
    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Total Products</h5>
        <h3 id="totalProducts">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Total Stock</h5>
        <h3 id="totalStock">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Low Stock Items</h5>
        <h3 id="lowStock">0</h3>
      </div>
    </div>
  </div>

  <!-- Filter -->
  <input type="text" id="search" class="form-control mb-3" placeholder="Search shoes...">

  <!-- Table -->
  <table class="table table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Size</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Status</th>
        <th>Buy</th>
      </tr>
    </thead>
    <tbody id="inventoryTable"></tbody>
  </table>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- <script src="vanillaJs.js"></script> -->
 <script src="jQuery.js"></script>
</body>
</html>
