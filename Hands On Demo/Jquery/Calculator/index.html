<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Calculator</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow p-4" style="width: 350px;">
    
    <h4 class="text-center mb-3">🧮 Calculator</h4>

    <div class="mb-3">
      <input type="text" id="num1" class="form-control" placeholder="Enter first number">
    </div>

    <div class="mb-3">
      <input type="number" id="num2" class="form-control" placeholder="Enter second number">
    </div>

    <div class="d-grid gap-2 mb-3">
      <button id="add" class="btn btn-primary">Add (+)</button>
      <button id="subtract" class="btn btn-secondary">Subtract (-)</button>
      <button id="multiply" class="btn btn-success">Multiply (*)</button>
      <button id="divide" class="btn btn-danger">Divide (/)</button>
    </div>

    <div id="result" class="alert alert-info text-center mb-0">
      Result:
    </div>

  </div>
</div>

<!-- jQuery (only needed for jQuery version) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- <script src="vanillaJs.js"></script> -->
<script src="jQuery.js"></script>
</body>
</html>
