<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles.css">
	<title>Group 1 Store</title>
</head>

<body>
	<h1>Bags for Sale</h1>

	<div class="bags1">
		<div class="polene">
			<img class="brand-image" src="poleen.jpg" alt="polene">
			<h5 class="product-name">Polene</h5>
			<p class="product-price">$520</p>
			<button class="btn btn-primary add-to-cart" data-name="Polene" data-price="520">Add to Cart</button>
		</div>

		<div class="louisVuitton">
			<img class="brand-image" src="lv.jpg" alt="lv">
			<h5 class="product-name">Louis Vuitton</h5>
			<p class="product-price">$1500</p>
			<button class="btn btn-primary add-to-cart" data-name="Louis Vuitton" data-price="1500" id="add1">Add to
				Cart</button>
		</div>

		<div class="gucci">
			<img class="brand-image" src="gucci.jpg" alt="gucci">
			<h5 class="product-name">Gucci</h5>
			<p class="product-price">$1800</p>
			<button class="btn btn-primary add-to-cart" data-name="Gucci" data-price="1800" id="add1">Add to Cart</button>
		</div>

		<div class="cuyana">
			<img class="brand-image" src="cuyana.jpg" alt="cayuna">
			<h5 class="product-name">Cuyana</h5>
			<p class="product-price">$320</p>
			<button class="btn btn-primary add-to-cart" data-name="Cuyana" data-price="320" id="add1">Add to Cart</button>
		</div>
	</div>

	<div class="bags2">
		<div class="lacoste">
			<img class="brand-image" src="lacoste.jpg" alt="lacoste">
			<h5 class="product-name">Lacoste</h5>
			<p class="product-price">$85</p>
			<button class="btn btn-primary add-to-cart" data-name="Lacoste" data-price="85" id="add1">Add to Cart</button>
		</div>

		<div class="telfar">
			<img class="brand-image" src="telfar.avif" alt="telfar">
			<h5 class="product-name">Telfar</h5>
			<p class="product-price">$200</p>
			<button class="btn btn-primary add-to-cart" data-name="Telfar" data-price="200" id="add1">Add to Cart</button>
		</div>

		<div class="coach">
			<img class="brand-image" src="coach.jpg" alt="coach">
			<h5 class="product-name">Coach</h5>
			<p class="product-price">$450</p>
			<button class="btn btn-primary add-to-cart" data-name="Coach" data-price="450" id="add1">Add to Cart</button>
		</div>

		<div class="longchamp">
			<img class="brand-image" src="longchamp.webp" alt="longchamp">
			<h5 class="product-name">Longchamp</h5>
			<p class="product-price">$350</p>
			<button class="btn btn-primary add-to-cart" data-name="Longchamp" data-price="350" id="add1">Add to Cart</button>
		</div>
	</div>
	<div class="item-summary">
		<div class="cart-quantity">
			<p class="quantity-number">Total Items:</p>
		</div>
		<div class="edit-items">
			<div class="checkout-button">
				<button class="checkout-button button">Checkout</button>
			</div>
			<div class="remove-button">
				<button class="remove-button button">Remove Item</button>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
</body>

</html>
