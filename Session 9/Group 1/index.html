<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
    <title>Group 1 Store</title>
</head>
<body>
	<div class="header">
		<h1>Bags for Sale</h1>
	</div>

    <div class="bags1">
		<div class="polene">
			<h5 class="product-name">Polene</h5>
			<p class="product-price">$520</p>
			<button class="btn btn-primary add-to-cart" data-name="Polene" data-price="520">Add to Cart</button>
		</div>

		<div class="louisVuitton">
			<h5 class="product-name">Louis Vuitton</h5>
			<p class="product-price">$1500</p> 
			<button class="btn btn-primary add-to-cart" data-name="Louis Vuitton" data-price="1500">Add to Cart</button>
		</div>
	
		<div class="gucci">
			<h5 class="product-name">Gucci</h5>
			<p class="product-price">$1800</p>
			<button class="btn btn-primary add-to-cart" data-name="Gucci" data-price="1800">Add to Cart</button>
		</div>

		<div class="cuyana">
			<h5 class="product-name">Cuyana</h5>
			<p class="product-price">$320</p>
			<button class="btn btn-primary add-to-cart" data-name="Cuyana" data-price="320">Add to Cart</button>
		</div>
	</div>

	<div class="bags2">
		<div class="lacoste">
			<h5 class="product-name">Lacoste</h5>
			<p class="product-price">$85</p>
			<button class="btn btn-primary add-to-cart" data-name="Lacoste" data-price="85">Add to Cart</button>
		</div>

		<div class="telfar">
			<h5 class="product-name">Telfar</h5>
			<p class="product-price">$200</p>
			<button class="btn btn-primary add-to-cart" data-name="Telfar" data-price="200">Add to Cart</button>
		</div>
			
		<div class="coach">
			<h5 class="product-name">Coach</h5>
			<p class="product-price">$450</p>
			<button class="btn btn-primary add-to-cart" data-name="Coach" data-price="450">Add to Cart</button>
		</div>

		<div class="longchamp">
			<h5 class="product-name">Longchamp</h5>
			<p class="product-price">$350</p>
			<button class="btn btn-primary add-to-cart" data-name="Longchamp" data-price="350">Add to Cart</button>
		</div>
	</div>
    
</body>
</html>
